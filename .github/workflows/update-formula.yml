name: Update Homebrew formula from R2 release

on:
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ github.event.client_payload.version }}
      ASSET_NAME: ${{ github.event.client_payload.asset_name }}
      FORMULA_NAME: mb-aws-helper
      R2_BASE_URL: https://downloads.bytestay.pt
      SOURCE_REPO: ${{ vars.SOURCE_REPO }}

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4

      - name: Checkout source repo at release tag
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: refs/tags/v${{ env.VERSION }}
          token: ${{ secrets.SOURCE_REPO_READ_TOKEN }}
          path: source-repo

      - name: Verify source repo checkout
        shell: bash
        run: |
          set -euo pipefail
          cd source-repo
          git rev-parse --short HEAD
          git tag --points-at HEAD
          ls -lah

      - name: Build download URL
        id: vars
        shell: bash
        run: |
          URL="${R2_BASE_URL}/releases/${ASSET_NAME}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "formula_file=Formula/${FORMULA_NAME}.rb" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        shell: bash
        run: |
          set -euo pipefail

          URL="${{ steps.vars.outputs.url }}"
          OUT="/tmp/${ASSET_NAME}"

          for i in {1..12}; do
            echo "Attempt $i to download release asset..."
            if curl -fL "$URL" -o "$OUT"; then
              ls -lh "$OUT"
              exit 0
            fi

            echo "Asset not available yet, waiting 10 seconds..."
            sleep 10
          done

          echo "Failed to download asset after multiple attempts: $URL"
          exit 1

      - name: Calculate SHA256
        id: sha
        shell: bash
        run: |
          SHA256=$(sha256sum "/tmp/${ASSET_NAME}" | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          PACKAGE_URL: ${{ steps.vars.outputs.url }}
          PACKAGE_SHA: ${{ steps.sha.outputs.sha256 }}
          FORMULA_FILE: ${{ steps.vars.outputs.formula_file }}
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          formula = Path(os.environ["FORMULA_FILE"])
          content = formula.read_text()

          content = re.sub(r'url\s+"[^"]+"', f'url "{os.environ["PACKAGE_URL"]}"', content)
          content = re.sub(r'sha256\s+"[^"]+"', f'sha256 "{os.environ["PACKAGE_SHA"]}"', content)

          formula.write_text(content)
          print(content)
          PY

      - name: Copy changelog from source repo
        shell: bash
        run: |
          set -euo pipefail

          if [ -f source-repo/CHANGELOG.md ]; then
            cp source-repo/CHANGELOG.md CHANGELOG.md
          fi

      - name: Copy docs from source repo
        shell: bash
        run: |
          set -euo pipefail

          if [ -d source-repo/docs ]; then
            rm -rf docs
            cp -R source-repo/docs ./docs

            find docs -name "._*" -delete || true
            find docs -name ".DS_Store" -delete || true
            find docs -type d -name "__MACOSX" -exec rm -rf {} + || true
          fi

          echo "Copied docs from source repo"
          find docs -type f 2>/dev/null | sort || true

      - name: Commit and push formula update
        id: commit_changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "Formula/${FORMULA_NAME}.rb"
          git add CHANGELOG.md docs 2>/dev/null || true

          git status --short

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "chore(release): ${FORMULA_NAME} ${VERSION}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists on origin"
            exit 0
          fi

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists"
            exit 0
          fi

          if [ -f CHANGELOG.md ]; then
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file "CHANGELOG.md"
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "Release v${VERSION}"
          fi